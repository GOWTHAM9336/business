<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayakumar Paal Pannai Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo-box">
        <img src="logo.png" alt="Jayakumar Paal Pannai Logo">
        <h1>Jayakumar Paal Pannai</h1>
        <p>Managed By Gayathiri Family</p>
    </div>

    <form id="loginForm">

        <h2>User Login</h2>

        <input
        type="text"
        id="username"
        placeholder="Enter Username"
        required>

        <input
        type="password"
        id="password"
        placeholder="Enter Password -(DD-MM-YYYY)"
        required>

        <button type="submit" class="submit-btn">
            Login
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
